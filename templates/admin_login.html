<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Valodle | Admin Login</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('asset_file', filename='icons/valodleicon.ico') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='valodle.css') }}" />
  </head>
  <body>
    <div class="bg-glow bg-glow-left"></div>
    <div class="bg-glow bg-glow-right"></div>

    <main class="home-shell admin-shell">
      <section class="panel admin-head">
        <div>
          <p class="eyebrow">Restricted Access</p>
          <h1 class="admin-title">Admin Login</h1>
          <p class="home-subtitle">Enter the admin password to continue.</p>
        </div>
        <div class="admin-actions">
          <a class="ghost-button" href="{{ url_for('home') }}">Back Home</a>
        </div>
      </section>

      {% if message %}
      <section class="panel admin-message"><strong>{{ message }}</strong></section>
      {% endif %}

      <section class="panel admin-card admin-login-card">
        <form class="admin-form" method="post" action="{{ url_for('admin_login') }}">
          <label>Password
            <input type="password" name="password" autocomplete="current-password" placeholder="Enter password" />
          </label>
          <button class="primary-button" type="submit">Enter Admin</button>
        </form>
      </section>
    </main>
    <footer class="site-footer">
      <strong>Legal:</strong> VALODLE is not affiliated with or endorsed by Riot Games. VALORANT is a trademark of Riot Games, Inc.
    </footer>
  </body>
</html>
